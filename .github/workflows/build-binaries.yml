name: Build & Package App

on:
  workflow_dispatch:        # manual trigger (builds only, no release)
  push:
    branches:
      - main                # seed reusable caches from default branch
    tags:
      - 'v*'               # tag push → build + create GitHub Release

# ──────────────────────────────────────────────────────────────────────
# Pinned versions — update these when upgrading
# ──────────────────────────────────────────────────────────────────────
env:
  FFMPEG_VERSION: "7.1.1"
  FFMPEG_TARBALL_SHA256: "733984395e0dbbe5c046abda2dc49a5544e7e0e1e2366bba849222ae9e3a03b1"
  GIFSKI_VERSION: "1.34.0"
  FLUTTER_VERSION: "3.41.0"
  NATIVE_CACHE_REV: "4"   # bump to force one-time rebuild

jobs:
  # ════════════════════════════════════════════════════════════════════
  # macOS (Apple Silicon only)
  # ════════════════════════════════════════════════════════════════════
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Restore ffmpeg/gifski build cache
        uses: actions/cache@v4
        id: restore-build
        with:
          key: ffmpeg-gifski-macos-${{ env.FFMPEG_VERSION }}-${{ env.GIFSKI_VERSION }}-r${{ env.NATIVE_CACHE_REV }}
          path: build-cache

      - name: Use restored binaries
        if: steps.restore-build.outputs.cache-hit == 'true'
        run: |
          cp -R build-cache/ffmpeg-install build-cache/gifski .

      # ── System deps ──────────────────────────────────────────────
      - name: Install build dependencies
        if: steps.restore-build.outputs.cache-hit != 'true'
        run: brew install nasm automake autoconf libtool pkg-config

      # ── Rust toolchain ─────────────────────────────────────────────
      - name: Install Rust toolchain
        if: steps.restore-build.outputs.cache-hit != 'true'
        uses: dtolnay/rust-toolchain@stable

      # ── ffmpeg from source ───────────────────────────────────────
      - name: Download & verify ffmpeg source
        if: steps.restore-build.outputs.cache-hit != 'true'
        run: |
          curl -L -o ffmpeg.tar.xz "https://ffmpeg.org/releases/ffmpeg-${FFMPEG_VERSION}.tar.xz"
          echo "${FFMPEG_TARBALL_SHA256}  ffmpeg.tar.xz" | shasum -a 256 -c -
          tar xf ffmpeg.tar.xz

      # ── ffmpeg configure flags (LGPL, static) ──────────────────
      # Strategy: only restrict OUTPUTS (encoders + muxers).
      # Keep all decoders, demuxers, parsers, and filters so any
      # input video format works. Disable network, devices, and
      # hwaccels to stay small.
      - name: Build ffmpeg (LGPL, static)
        if: steps.restore-build.outputs.cache-hit != 'true'
        run: |
          cd ffmpeg-${FFMPEG_VERSION}
          ./configure \
            --prefix="$(pwd)/../ffmpeg-install" \
            --disable-doc --disable-htmlpages --disable-manpages \
            --disable-podpages --disable-txtpages \
            --disable-autodetect \
            --enable-zlib \
            --disable-network \
            --disable-programs --enable-ffmpeg \
            --enable-static --disable-shared \
            --disable-debug --enable-small \
            --disable-libxcb --disable-xlib \
            --disable-encoders \
            --enable-encoder=gif --enable-encoder=png --enable-encoder=rawvideo \
            --disable-muxers \
            --enable-muxer=gif --enable-muxer=image2 --enable-muxer=null \
            --disable-devices --disable-hwaccels \
            --extra-cflags="-O2"
          make -j$(sysctl -n hw.ncpu)
          make install

      - name: Verify ffmpeg
        run: |
          ./ffmpeg-install/bin/ffmpeg -version
          file ./ffmpeg-install/bin/ffmpeg
          ./ffmpeg-install/bin/ffmpeg -hide_banner -decoders | tee ffmpeg-decoders.txt
          for dec in h264 hevc vp9 av1 prores mpeg4; do
            if ! grep -Eq "^[[:space:]]*V[^[:space:]]*[[:space:]]+${dec}([[:space:]]|$)" ffmpeg-decoders.txt; then
              echo "Required decoder missing: ${dec}"
              exit 1
            fi
          done
          ./ffmpeg-install/bin/ffmpeg -hide_banner -demuxers | tee ffmpeg-demuxers.txt
          for dem in "mov,mp4,m4a,3gp,3g2,mj2" "matroska,webm" "avi"; do
            if ! grep -Fq "${dem}" ffmpeg-demuxers.txt; then
              echo "Required demuxer missing: ${dem}"
              exit 1
            fi
          done
          ./ffmpeg-install/bin/ffmpeg -hide_banner -encoders | tee ffmpeg-encoders.txt
          if ! grep -Eq "^[[:space:]]*V\\.[^[:space:]]*[[:space:]]+png([[:space:]]|$)" ffmpeg-encoders.txt; then
            echo "Required png encoder is missing from ffmpeg build"
            exit 1
          fi
          ./ffmpeg-install/bin/ffmpeg -hide_banner -filters | tee ffmpeg-filters.txt
          for flt in fps scale crop trim setpts reverse concat split format colorkey; do
            if ! grep -Ewq "${flt}" ffmpeg-filters.txt; then
              echo "Required filter missing: ${flt}"
              exit 1
            fi
          done
          # Smoke test: ensure ffmpeg can actually emit a PNG frame.
          ./ffmpeg-install/bin/ffmpeg -hide_banner \
            -f lavfi -i "color=white:s=64x64:d=0.1" \
            -vframes 1 -c:v png -f image2 -y ffmpeg-smoke.png
          test -s ffmpeg-smoke.png
          otool -L ./ffmpeg-install/bin/ffmpeg | tee ffmpeg-otool.txt
          if grep -E "/opt/homebrew|/usr/local/opt|libX11" ffmpeg-otool.txt >/dev/null; then
            echo "Unexpected external ffmpeg linkage detected"
            exit 1
          fi

      # ── gifski shared library from source ──────────────────────────
      - name: Clone & build gifski (shared library)
        if: steps.restore-build.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch "${GIFSKI_VERSION}" https://github.com/ImageOptim/gifski.git
          cd gifski
          cargo build --release
          file target/release/libgifski.dylib

      - name: Prepare build cache
        if: steps.restore-build.outputs.cache-hit != 'true'
        run: |
          mkdir -p build-cache
          cp -R ffmpeg-install gifski build-cache/

      # ── Binary checksums ─────────────────────────────────────────
      - name: Compute binary checksums
        run: |
          mkdir -p binary-out
          cp ffmpeg-install/bin/ffmpeg binary-out/ffmpeg
          cp gifski/target/release/libgifski.dylib binary-out/libgifski.dylib
          chmod +x binary-out/ffmpeg
          cd binary-out && shasum -a 256 ffmpeg libgifski.dylib | tee checksums.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: binaries-macos-arm64
          path: binary-out/

      # ── Code-signing certificate ─────────────────────────────────
      - name: Import code-signing certificate
        if: (github.event_name != 'push' || github.ref != 'refs/heads/main') && env.MACOS_CERTIFICATE_P12 != ''
        env:
          MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          CERT_FILE="$(mktemp /tmp/cert_XXXXXX).p12"
          KEYCHAIN_FILE="/tmp/build-$(uuidgen).keychain-db"
          KEYCHAIN_PASSWORD=$(openssl rand -hex 20)

          echo "$MACOS_CERTIFICATE_P12" | base64 --decode > "$CERT_FILE"

          security delete-keychain "$KEYCHAIN_FILE" 2>/dev/null || true
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_FILE"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_FILE"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_FILE"
          security import "$CERT_FILE" -P "$MACOS_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_FILE"
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_FILE"
          security list-keychains -d user -s "$KEYCHAIN_FILE" $(security list-keychains -d user | tr -d '"')

          echo "KEYCHAIN_FILE=$KEYCHAIN_FILE" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> "$GITHUB_ENV"
          rm -f "$CERT_FILE"

      # ── Flutter app build ────────────────────────────────────────
      - uses: subosito/flutter-action@v2
        if: github.event_name != 'push' || github.ref != 'refs/heads/main'
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Place binaries for macOS bundle
        if: github.event_name != 'push' || github.ref != 'refs/heads/main'
        run: |
          mkdir -p macos/Runner/Resources
          cp ffmpeg-install/bin/ffmpeg macos/Runner/Resources/ffmpeg
          cp gifski/target/release/libgifski.dylib macos/Runner/Resources/libgifski.dylib
          chmod +x macos/Runner/Resources/ffmpeg

      - name: Build macOS app
        if: github.event_name != 'push' || github.ref != 'refs/heads/main'
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            flutter build macos --release \
              --build-name "${GITHUB_REF_NAME#v}" \
              --build-number "${GITHUB_RUN_NUMBER}"
          else
            flutter build macos --release
          fi

      # ── Code-sign & notarize ────────────────────────────────────
      - name: Codesign app bundle
        if: (github.event_name != 'push' || github.ref != 'refs/heads/main') && env.MACOS_CERTIFICATE_P12 != ''
        env:
          MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          CERT_NAME: ${{ secrets.MACOS_CERT_NAME }}
        run: |
          APP_DIR="build/macos/Build/Products/Release"
          APP_NAME=$(ls -d "$APP_DIR"/*.app | head -1)
          ENTITLEMENTS="macos/Runner/Release.entitlements"

          # Sign bundled CLI tools and shared libraries with hardened runtime
          # ffmpeg needs allow-unsigned-executable-memory for JIT SIMD decoding
          # libgifski needs disable-library-validation to load from Resources
          codesign --force --options runtime \
            --sign "$CERT_NAME" \
            --entitlements "$ENTITLEMENTS" \
            "$APP_NAME/Contents/Resources/ffmpeg" \
            "$APP_NAME/Contents/Resources/libgifski.dylib"

          # Sign all embedded frameworks and dylibs
          find "$APP_NAME/Contents/Frameworks" -type f \( -name "*.dylib" -o -perm +111 \) | while read lib; do
            codesign --force --options runtime \
              --sign "$CERT_NAME" \
              --entitlements "$ENTITLEMENTS" "$lib"
          done

          find "$APP_NAME/Contents/Frameworks" -name "*.framework" -type d | while read fw; do
            codesign --force --options runtime \
              --sign "$CERT_NAME" \
              --entitlements "$ENTITLEMENTS" "$fw"
          done

          # Sign the main app bundle
          codesign --force --options runtime \
            --sign "$CERT_NAME" \
            --entitlements "$ENTITLEMENTS" \
            "$APP_NAME"

          # Verify
          codesign --verify --deep --strict --verbose=2 "$APP_NAME"

      - name: Notarize app
        if: (github.event_name != 'push' || github.ref != 'refs/heads/main') && env.MACOS_CERTIFICATE_P12 != '' && env.APPLE_ID != ''
        env:
          MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          APP_DIR="build/macos/Build/Products/Release"
          APP_NAME=$(ls -d "$APP_DIR"/*.app | head -1)

          # Create zip for notarization submission
          ditto -c -k --sequesterRsrc --keepParent "$APP_NAME" notarize-upload.zip

          # Submit for notarization and wait
          xcrun notarytool submit notarize-upload.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait --timeout 30m

          # Staple the notarization ticket to the app
          xcrun stapler staple "$APP_NAME"

          rm -f notarize-upload.zip

      - name: Package macOS app
        if: github.event_name != 'push' || github.ref != 'refs/heads/main'
        run: |
          cd build/macos/Build/Products/Release
          APP_NAME=$(ls -d *.app | head -1)
          echo "Found app: $APP_NAME"
          ls -la "$APP_NAME/Contents/Resources/ffmpeg" \
                 "$APP_NAME/Contents/Resources/libgifski.dylib"
          "$APP_NAME/Contents/Resources/ffmpeg" -version 2>&1 | head -1
          file "$APP_NAME/Contents/Resources/libgifski.dylib"
          ditto -c -k --sequesterRsrc --keepParent "$APP_NAME" \
                GifDrop-macos-arm64.zip

      # ── Clean up keychain ───────────────────────────────────────
      - name: Clean up keychain
        if: always() && (github.event_name != 'push' || github.ref != 'refs/heads/main') && env.KEYCHAIN_FILE != ''
        run: security delete-keychain "$KEYCHAIN_FILE" || true

      - uses: actions/upload-artifact@v4
        if: github.event_name != 'push' || github.ref != 'refs/heads/main'
        with:
          name: app-macos-arm64
          path: build/macos/Build/Products/Release/GifDrop-macos-arm64.zip

  # ════════════════════════════════════════════════════════════════════
  # Linux x86_64
  # ════════════════════════════════════════════════════════════════════
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Restore ffmpeg/gifski build cache
        uses: actions/cache@v4
        id: restore-build
        with:
          key: ffmpeg-gifski-linux-${{ env.FFMPEG_VERSION }}-${{ env.GIFSKI_VERSION }}-r${{ env.NATIVE_CACHE_REV }}
          path: build-cache

      - name: Use restored binaries
        if: steps.restore-build.outputs.cache-hit == 'true'
        run: cp -R build-cache/ffmpeg-install build-cache/gifski .

      # ── System deps ──────────────────────────────────────────────
      - name: Install Flutter build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev ninja-build \
            clang cmake pkg-config libblkid-dev liblzma-dev

      - name: Install native build dependencies
        if: steps.restore-build.outputs.cache-hit != 'true'
        run: |
          sudo apt-get install -y nasm yasm build-essential autoconf automake libtool

      # ── Rust toolchain ─────────────────────────────────────────────
      - name: Install Rust toolchain
        if: steps.restore-build.outputs.cache-hit != 'true'
        uses: dtolnay/rust-toolchain@stable

      # ── ffmpeg from source ───────────────────────────────────────
      - name: Download & verify ffmpeg source
        if: steps.restore-build.outputs.cache-hit != 'true'
        run: |
          curl -L -o ffmpeg.tar.xz "https://ffmpeg.org/releases/ffmpeg-${FFMPEG_VERSION}.tar.xz"
          echo "${FFMPEG_TARBALL_SHA256}  ffmpeg.tar.xz" | sha256sum -c -
          tar xf ffmpeg.tar.xz

      - name: Build ffmpeg (LGPL, static)
        if: steps.restore-build.outputs.cache-hit != 'true'
        run: |
          cd ffmpeg-${FFMPEG_VERSION}
          ./configure \
            --prefix="$(pwd)/../ffmpeg-install" \
            --disable-doc --disable-htmlpages --disable-manpages \
            --disable-podpages --disable-txtpages \
            --disable-network \
            --disable-programs --enable-ffmpeg \
            --enable-static --disable-shared \
            --disable-debug --enable-small \
            --extra-ldflags="-static" --pkg-config-flags="--static" \
            --disable-encoders \
            --enable-encoder=gif --enable-encoder=png --enable-encoder=rawvideo \
            --disable-muxers \
            --enable-muxer=gif --enable-muxer=image2 --enable-muxer=null \
            --disable-devices --disable-hwaccels \
            --extra-cflags="-O2"
          make -j$(nproc)
          make install

      - name: Verify ffmpeg
        run: |
          ./ffmpeg-install/bin/ffmpeg -version
          file ./ffmpeg-install/bin/ffmpeg
          ldd ./ffmpeg-install/bin/ffmpeg || echo "(static binary)"
          ./ffmpeg-install/bin/ffmpeg -hide_banner -decoders | tee ffmpeg-decoders.txt
          for dec in h264 hevc vp9 av1 prores mpeg4; do
            if ! grep -Eq "^[[:space:]]*V[^[:space:]]*[[:space:]]+${dec}([[:space:]]|$)" ffmpeg-decoders.txt; then
              echo "Required decoder missing: ${dec}"
              exit 1
            fi
          done
          ./ffmpeg-install/bin/ffmpeg -hide_banner -demuxers | tee ffmpeg-demuxers.txt
          for dem in "mov,mp4,m4a,3gp,3g2,mj2" "matroska,webm" "avi"; do
            if ! grep -Fq "${dem}" ffmpeg-demuxers.txt; then
              echo "Required demuxer missing: ${dem}"
              exit 1
            fi
          done
          ./ffmpeg-install/bin/ffmpeg -hide_banner -encoders | tee ffmpeg-encoders.txt
          if ! grep -Eq "^[[:space:]]*V\\.[^[:space:]]*[[:space:]]+png([[:space:]]|$)" ffmpeg-encoders.txt; then
            echo "Required png encoder is missing from ffmpeg build"
            exit 1
          fi
          ./ffmpeg-install/bin/ffmpeg -hide_banner -filters | tee ffmpeg-filters.txt
          for flt in fps scale crop trim setpts reverse concat split format colorkey; do
            if ! grep -Ewq "${flt}" ffmpeg-filters.txt; then
              echo "Required filter missing: ${flt}"
              exit 1
            fi
          done
          ./ffmpeg-install/bin/ffmpeg -hide_banner \
            -f lavfi -i "color=white:s=64x64:d=0.1" \
            -vframes 1 -c:v png -f image2 -y ffmpeg-smoke.png
          test -s ffmpeg-smoke.png

      # ── gifski shared library from source ──────────────────────────
      - name: Clone & build gifski (shared library)
        if: steps.restore-build.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch "${GIFSKI_VERSION}" https://github.com/ImageOptim/gifski.git
          cd gifski
          cargo build --release
          file target/release/libgifski.so

      - name: Prepare build cache
        if: steps.restore-build.outputs.cache-hit != 'true'
        run: |
          mkdir -p build-cache
          cp -R ffmpeg-install gifski build-cache/

      # ── Binary checksums ─────────────────────────────────────────
      - name: Compute binary checksums
        run: |
          mkdir -p binary-out
          cp ffmpeg-install/bin/ffmpeg binary-out/ffmpeg
          cp gifski/target/release/libgifski.so binary-out/libgifski.so
          chmod +x binary-out/ffmpeg
          cd binary-out && sha256sum ffmpeg libgifski.so | tee checksums.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: binaries-linux-x86_64
          path: binary-out/

      # ── Flutter app build ────────────────────────────────────────
      - uses: subosito/flutter-action@v2
        if: github.event_name != 'push' || github.ref != 'refs/heads/main'
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Build Linux app
        if: github.event_name != 'push' || github.ref != 'refs/heads/main'
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            flutter build linux --release \
              --build-name "${GITHUB_REF_NAME#v}" \
              --build-number "${GITHUB_RUN_NUMBER}"
          else
            flutter build linux --release
          fi

      - name: Inject binaries into Linux bundle
        if: github.event_name != 'push' || github.ref != 'refs/heads/main'
        run: |
          BUNDLE="build/linux/x64/release/bundle"
          # BinaryResolver looks for <exec>/lib/ffmpeg
          # GifskiLibrary looks for <exec>/lib/libgifski.so
          cp ffmpeg-install/bin/ffmpeg "${BUNDLE}/lib/ffmpeg"
          cp gifski/target/release/libgifski.so "${BUNDLE}/lib/libgifski.so"
          chmod +x "${BUNDLE}/lib/ffmpeg"
          # Verify
          "${BUNDLE}/lib/ffmpeg" -version 2>&1 | head -1
          file "${BUNDLE}/lib/libgifski.so"

      - name: Package Linux app
        if: github.event_name != 'push' || github.ref != 'refs/heads/main'
        run: |
          cd build/linux/x64/release
          tar czf GifDrop-linux-x86_64.tar.gz -C bundle .

      - uses: actions/upload-artifact@v4
        if: github.event_name != 'push' || github.ref != 'refs/heads/main'
        with:
          name: app-linux-x86_64
          path: build/linux/x64/release/GifDrop-linux-x86_64.tar.gz

  # ════════════════════════════════════════════════════════════════════
  # Windows x86_64  (MSYS2 for native deps, PowerShell for Flutter)
  # ════════════════════════════════════════════════════════════════════
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore ffmpeg/gifski build cache
        uses: actions/cache@v4
        id: restore-build
        with:
          key: ffmpeg-gifski-windows-${{ env.FFMPEG_VERSION }}-${{ env.GIFSKI_VERSION }}-r${{ env.NATIVE_CACHE_REV }}
          path: build-cache

      # ── Build ffmpeg in MSYS2 ───────────────────────────────────
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-nasm
            mingw-w64-x86_64-yasm
            autoconf automake libtool make pkg-config
            tar git diffutils

      - name: Use restored binaries
        if: steps.restore-build.outputs.cache-hit == 'true'
        shell: msys2 {0}
        run: cp -r build-cache/ffmpeg-install .

      - name: Download & verify ffmpeg source
        if: steps.restore-build.outputs.cache-hit != 'true'
        shell: msys2 {0}
        run: |
          curl -L -o ffmpeg.tar.xz "https://ffmpeg.org/releases/ffmpeg-${FFMPEG_VERSION}.tar.xz"
          echo "${FFMPEG_TARBALL_SHA256}  ffmpeg.tar.xz" | sha256sum -c -
          tar xf ffmpeg.tar.xz

      - name: Build ffmpeg (LGPL, static)
        if: steps.restore-build.outputs.cache-hit != 'true'
        shell: msys2 {0}
        run: |
          cd ffmpeg-${FFMPEG_VERSION}
          ./configure \
            --prefix="$(pwd)/../ffmpeg-install" \
            --target-os=mingw32 \
            --disable-doc --disable-htmlpages --disable-manpages \
            --disable-podpages --disable-txtpages \
            --disable-network \
            --disable-programs --enable-ffmpeg \
            --enable-static --disable-shared \
            --disable-debug --enable-small \
            --extra-ldflags="-static" --pkg-config-flags="--static" \
            --disable-encoders \
            --enable-encoder=gif --enable-encoder=png --enable-encoder=rawvideo \
            --disable-muxers \
            --enable-muxer=gif --enable-muxer=image2 --enable-muxer=null \
            --disable-devices --disable-hwaccels \
            --extra-cflags="-O2"
          make -j$(nproc)
          make install

      - name: Verify ffmpeg
        shell: msys2 {0}
        run: |
          ./ffmpeg-install/bin/ffmpeg.exe -version
          ./ffmpeg-install/bin/ffmpeg.exe -hide_banner -decoders | tee ffmpeg-decoders.txt
          for dec in h264 hevc vp9 av1 prores mpeg4; do
            if ! grep -Eq "^[[:space:]]*V[^[:space:]]*[[:space:]]+${dec}([[:space:]]|$)" ffmpeg-decoders.txt; then
              echo "Required decoder missing: ${dec}"
              exit 1
            fi
          done
          ./ffmpeg-install/bin/ffmpeg.exe -hide_banner -demuxers | tee ffmpeg-demuxers.txt
          for dem in "mov,mp4,m4a,3gp,3g2,mj2" "matroska,webm" "avi"; do
            if ! grep -Fq "${dem}" ffmpeg-demuxers.txt; then
              echo "Required demuxer missing: ${dem}"
              exit 1
            fi
          done
          ./ffmpeg-install/bin/ffmpeg.exe -hide_banner -encoders | tee ffmpeg-encoders.txt
          if ! grep -Eq "^[[:space:]]*V\\.[^[:space:]]*[[:space:]]+png([[:space:]]|$)" ffmpeg-encoders.txt; then
            echo "Required png encoder is missing from ffmpeg build"
            exit 1
          fi
          ./ffmpeg-install/bin/ffmpeg.exe -hide_banner -filters | tee ffmpeg-filters.txt
          for flt in fps scale crop trim setpts reverse concat split format colorkey; do
            if ! grep -Ewq "${flt}" ffmpeg-filters.txt; then
              echo "Required filter missing: ${flt}"
              exit 1
            fi
          done
          ./ffmpeg-install/bin/ffmpeg.exe -hide_banner \
            -f lavfi -i "color=white:s=64x64:d=0.1" \
            -vframes 1 -c:v png -f image2 -y ffmpeg-smoke.png
          test -s ffmpeg-smoke.png

      # ── gifski shared library (built with Rust on Windows) ─────────
      - name: Install Rust toolchain
        if: steps.restore-build.outputs.cache-hit != 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Clone & build gifski (shared library)
        if: steps.restore-build.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch "$env:GIFSKI_VERSION" https://github.com/ImageOptim/gifski.git
          cd gifski
          cargo build --release
          Get-Item target\release\gifski.dll

      - name: Restore gifski from cache
        if: steps.restore-build.outputs.cache-hit == 'true'
        run: |
          Copy-Item -Recurse build-cache\gifski .

      - name: Prepare build cache
        if: steps.restore-build.outputs.cache-hit != 'true'
        shell: msys2 {0}
        run: mkdir -p build-cache && cp -r ffmpeg-install build-cache/

      - name: Prepare gifski build cache
        if: steps.restore-build.outputs.cache-hit != 'true'
        run: |
          New-Item -ItemType Directory -Force -Path build-cache\gifski\target\release | Out-Null
          Copy-Item gifski\target\release\gifski.dll build-cache\gifski\target\release\gifski.dll

      - name: Compute binary checksums
        shell: msys2 {0}
        run: |
          mkdir -p binary-out
          cp ffmpeg-install/bin/ffmpeg.exe binary-out/ffmpeg.exe
          cp gifski/target/release/gifski.dll binary-out/gifski.dll
          cd binary-out && sha256sum ffmpeg.exe gifski.dll | tee checksums.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: binaries-windows-x86_64
          path: binary-out/

      # ── Flutter app build (PowerShell) ───────────────────────────
      - uses: subosito/flutter-action@v2
        if: github.event_name != 'push' || github.ref != 'refs/heads/main'
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Build Windows app
        if: github.event_name != 'push' || github.ref != 'refs/heads/main'
        run: |
          if ($env:GITHUB_REF -like "refs/tags/v*") {
            flutter build windows --release --build-name "$($env:GITHUB_REF_NAME -replace '^v','')" --build-number "$env:GITHUB_RUN_NUMBER"
          } else {
            flutter build windows --release
          }

      - name: Inject binaries into Windows bundle
        if: github.event_name != 'push' || github.ref != 'refs/heads/main'
        shell: pwsh
        run: |
          $bundle = "build\windows\x64\runner\Release"
          # BinaryResolver looks for <exec>\data\ffmpeg.exe
          # GifskiLibrary looks for <exec>\data\gifski.dll
          New-Item -ItemType Directory -Force -Path "$bundle\data" | Out-Null
          Copy-Item "ffmpeg-install\bin\ffmpeg.exe" "$bundle\data\ffmpeg.exe"
          Copy-Item "gifski\target\release\gifski.dll" "$bundle\data\gifski.dll"
          # Verify
          & "$bundle\data\ffmpeg.exe" -version 2>&1 | Select-Object -First 1
          Get-Item "$bundle\data\gifski.dll"

      - name: Package Windows app
        if: github.event_name != 'push' || github.ref != 'refs/heads/main'
        shell: pwsh
        run: |
          $bundle = "build\windows\x64\runner\Release"
          Compress-Archive -Path "$bundle\*" -DestinationPath "GifDrop-windows-x86_64.zip"

      - uses: actions/upload-artifact@v4
        if: github.event_name != 'push' || github.ref != 'refs/heads/main'
        with:
          name: app-windows-x86_64
          path: GifDrop-windows-x86_64.zip

  # ════════════════════════════════════════════════════════════════════
  # Create GitHub Release (only on tag push)
  # ════════════════════════════════════════════════════════════════════
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      # ── Download all artifacts ───────────────────────────────────
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      # ── Collect release assets ───────────────────────────────────
      - name: Prepare release assets
        run: |
          mkdir -p release-assets

          # App bundles
          cp artifacts/app-macos-arm64/GifDrop-macos-arm64.zip         release-assets/
          cp artifacts/app-linux-x86_64/GifDrop-linux-x86_64.tar.gz    release-assets/
          cp artifacts/app-windows-x86_64/GifDrop-windows-x86_64.zip   release-assets/

          # Standalone binaries (for manual bundling)
          for platform in macos-arm64 linux-x86_64 windows-x86_64; do
            dir="artifacts/binaries-${platform}"
            if [ -d "$dir" ]; then
              tar czf "release-assets/binaries-${platform}.tar.gz" -C "$dir" .
            fi
          done

          # Combined checksums
          echo "# Binary checksums per platform" > release-assets/checksums.sha256
          for dir in artifacts/binaries-*/; do
            platform=$(basename "$dir")
            if [ -f "${dir}checksums.sha256" ]; then
              echo "" >> release-assets/checksums.sha256
              echo "## ${platform}" >> release-assets/checksums.sha256
              cat "${dir}checksums.sha256" >> release-assets/checksums.sha256
            fi
          done

          # App archive checksums
          echo "" >> release-assets/checksums.sha256
          echo "## App archives" >> release-assets/checksums.sha256
          cd release-assets
          sha256sum GifDrop-*.zip GifDrop-*.tar.gz >> checksums.sha256 2>/dev/null || true
          cat checksums.sha256

          ls -la

      # ── Create release ───────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Downloads

            | Platform | File |
            |----------|------|
            | macOS (Apple Silicon) | `GifDrop-macos-arm64.zip` |
            | Linux (x86_64) | `GifDrop-linux-x86_64.tar.gz` |
            | Windows (x86_64) | `GifDrop-windows-x86_64.zip` |

            ### Bundled binary versions
            - **ffmpeg** ${{ env.FFMPEG_VERSION }} (LGPL 2.1+, built from source)
            - **gifski** ${{ env.GIFSKI_VERSION }} (MIT, built from source)

            ### Verification
            All checksums are in `checksums.sha256`. Verify after download:
            ```
            sha256sum -c checksums.sha256
            ```
          files: |
            release-assets/GifDrop-macos-arm64.zip
            release-assets/GifDrop-linux-x86_64.tar.gz
            release-assets/GifDrop-windows-x86_64.zip
            release-assets/binaries-macos-arm64.tar.gz
            release-assets/binaries-linux-x86_64.tar.gz
            release-assets/binaries-windows-x86_64.tar.gz
            release-assets/checksums.sha256
